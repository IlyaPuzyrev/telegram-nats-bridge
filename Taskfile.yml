version: '3'

dotenv: ['.env']

tasks:
  build:
    desc: Build the binary to .bin/
    cmds:
      - mkdir -p .bin
      - go build -o .bin/telegram-nats-bridge .

  run:
    desc: Run for development (requires config.yaml)
    cmds:
      - go run . run --config config.yaml

  check-bot:
    desc: Check bot and print updates as JSON (requires config.yaml)
    cmds:
      - go run . check bot --config config.yaml

  test:
    desc: Run tests
    cmds:
      - go test ./...

  nats-up:
    desc: Start NATS container
    cmds:
      - docker compose up -d nats

  nats-down:
    desc: Stop NATS container
    cmds:
      - docker compose stop nats

  kafka-up:
    desc: Start Kafka container
    cmds:
      - docker compose up -d kafka

  kafka-down:
    desc: Stop Kafka container
    cmds:
      - docker compose stop kafka

  nats-box:
    desc: Subscribe to NATS subject (requires running nats container)
    cmds:
      - docker run --rm -it --network host natsio/nats-box

